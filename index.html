<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Territorios - Grafitis</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-bg">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="XD.mp4" type="video/mp4">
        </video>
    </div>
    <div class="container">
        <header class="header">
            <h1>Sistema de Territorios</h1>

        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Total Territorios</span>
                <span class="stat-value" id="totalTerritorios">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Activos</span>
                <span class="stat-value stat-active" id="activos">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Por Renovar</span>
                <span class="stat-value stat-warning" id="porRenovar">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Expirados</span>
                <span class="stat-value stat-expired" id="expirados">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="addGraffitiBtn">
                <span class="icon">+</span> Registrar Grafiti
            </button>
            <a href="mapa.html" class="btn btn-secondary">
                <span class="icon">MAP</span> Ver Mapa
            </a>

        </div>

        <div class="territories-grid" id="territoriesGrid">
            <!-- Los territorios se cargan dinámicamente -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🎨</div>
            <h3>No hay territorios registrados</h3>
            <p>Comienza registrando tu primer grafiti</p>
        </div>
    </div>

    <!-- Modal para agregar grafiti -->
    <div class="modal" id="addGraffitiModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Registrar Grafiti</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="graffitiForm">
                <div class="form-group">
                    <label for="territorySelect">Territorio existente</label>
                    <select id="territorySelect">
                        <option value="">-- Nuevo territorio --</option>
                    </select>
                </div>
                <div class="form-group" id="newTerritoryGroup">
                    <label for="territoryName">O nombre del nuevo territorio</label>
                    <input type="text" id="territoryName" placeholder="Ej: Cypress Flats">
                </div>
                <div class="form-group">
                    <label for="graffitiDate">Fecha del Grafiti</label>
                    <input type="datetime-local" id="graffitiDate" required>
                </div>
                <div class="form-group">
                    <label for="graffitiNotes">Notas (opcional)</label>
                    <textarea id="graffitiNotes" placeholder="Descripción del grafiti, ubicación exacta, etc."></textarea>
                </div>
                <div class="form-group">
                    <label for="graffitiQuantity">Cantidad de Grafitis</label>
                    <input type="number" id="graffitiQuantity" min="1" value="1" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Registrar</button>
                <button type="button" class="btn btn-secondary btn-full" id="cancelModal" style="margin-top: 10px;">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- Modal para ver detalles -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailsTitle">Detalles del Territorio</h2>
                <button class="modal-close" id="closeDetailsModal">&times;</button>
            </div>
            <div class="details-content" id="detailsContent">
            </div>
        </div>
    </div>

    <!-- Modal para editar/renovar grafiti -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="editModalTitle">Editar Grafiti</h2>
                <button class="modal-close" onclick="document.getElementById('editModal').classList.remove('active')">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editTerritoryName">
                <input type="hidden" id="editGraffitiIndex">
                <div class="form-group">
                    <label for="editDate">Fecha del Grafiti</label>
                    <input type="datetime-local" id="editDate" required>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Cantidad</label>
                    <input type="number" id="editQuantity" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label for="editNotes">Notas</label>
                    <textarea id="editNotes" placeholder="Opcional"></textarea>
                </div>
                <div style="padding: 15px 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Guardar</button>
                    <button type="button" class="btn btn-secondary" style="flex:1;" onclick="document.getElementById('editModal').classList.remove('active')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="notifications" id="notifications">
        <!-- Notificaciones dinámicas -->
    </div>

    <script src="map-territories.js"></script>
    <script src="app.js"></script>
    <script src="index-app.js"></script>
</body>
</html>
