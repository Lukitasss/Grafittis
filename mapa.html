<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Territorios</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0f; }
        .map-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        .map-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .map-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .map-header p { color: #a0a0b0; }
        .map-stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .map-stat {
            background: #1a1a25;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            text-align: center;
        }
        .map-stat .label { font-size: 0.8rem; color: #a0a0b0; }
        .map-stat .value { font-size: 1.5rem; font-weight: 700; }
        .map-grid {
            display: grid;
            gap: 4px;
            background: #12121a;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #2a2a3a;
        }
        .region-label {
            grid-column: 1 / -1;
            text-align: center;
            padding: 8px;
            color: #6366f1;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a3a;
            margin-bottom: 5px;
        }
        .territory-cell {
            background: #1a1a25;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            border: 1px solid #2a2a3a;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .territory-cell:hover {
            transform: scale(1.02);
            border-color: #6366f1;
            z-index: 10;
        }
        .territory-cell.active { border-left: 3px solid #22c55e; }
        .territory-cell.warning { border-left: 3px solid #f59e0b; }
        .territory-cell.expired { border-left: 3px solid #ef4444; }
        .territory-cell.no-graffiti { border-left: 3px solid #333; opacity: 0.6; }
        .territory-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        .territory-count {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .territory-count.zero { color: #333; }
        .territory-count.low { color: #22c55e; }
        .territory-count.medium { color: #f59e0b; }
        .territory-count.high { color: #ef4444; }
        .territory-time {
            font-size: 0.65rem;
            color: #a0a0b0;
            margin-top: 2px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #1a1a25;
            color: #a0a0b0;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #2a2a3a; color: #fff; }
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #a0a0b0;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .legend-dot.active { background: #22c55e; }
        .legend-dot.warning { background: #f59e0b; }
        .legend-dot.expired { background: #ef4444; }
        .legend-dot.none { background: #333; }
        .region-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 4px;
            margin-bottom: 8px;
        }
            .territory-name { font-size: 0.65rem; }
            .territory-count { font-size: 1.1rem; }
            .territory-cell { min-height: 55px; padding: 5px; }
        }
    </style>
</head>
<body>
    <div class="map-container">
        <a href="index.html" class="back-btn">← Volver al listado</a>
        
        <div class="map-header">
            <h1>Mapa de Territorios</h1>
            <p>Cantidad de grafitis por zona - Actualización en tiempo real</p>
        </div>
        
        <div class="map-stats">
            <div class="map-stat">
                <div class="label">Total Territorios</div>
                <div class="value" id="totalMap">49</div>
            </div>
            <div class="map-stat">
                <div class="label">Con Grafitis</div>
                <div class="value stat-active" id="conGrafitis">0</div>
            </div>
            <div class="map-stat">
                <div class="label">Sin Grafitis</div>
                <div class="value" id="sinGrafitis" style="color:#666">0</div>
            </div>
            <div class="map-stat">
                <div class="label">Total Grafitis</div>
                <div class="value" id="totalGrafitis">0</div>
            </div>
        </div>
        
        <div class="map-grid" id="mapGrid">
            <!-- Se llena con JavaScript -->
        </div>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-dot active"></div> Activo (4+ días)</div>
            <div class="legend-item"><div class="legend-dot warning"></div> Por renovar (1-3 días)</div>
            <div class="legend-item"><div class="legend-dot expired"></div> Expirado</div>
            <div class="legend-item"><div class="legend-dot none"></div> Sin grafitis</div>
        </div>
    </div>
    
    <script src="map-territories.js"></script>
    <script src="app.js"></script>
    <script src="map.js"></script>
</body>
</html>
